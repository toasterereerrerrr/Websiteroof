<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointment Scheduler</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      width: 100%;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #0056b3;
    }

    #formBox {
      display: none;
    }

    #thankYouPage {
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Main Page -->
    <div id="mainPage">
      <h2>Appointment Scheduler</h2>

      <button onclick="showForm()">Schedule Appointment</button>

      <div id="formBox">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="text" id="address" placeholder="Your Address" required>

        <button onclick="requestAppointment()">Request</button>
      </div>
    </div>

    <!-- Thank You Page -->
    <div id="thankYouPage">
      <h2>Thank You!</h2>
      <p>Your appointment request has been sent.</p>
    </div>

  </div>

  <script>
    function showForm() {
      document.getElementById("formBox").style.display = "block";
    }

    function requestAppointment() {
      const name = document.getElementById("name").value;
      const address = document.getElementById("address").value;

      const subject = encodeURIComponent("New Appointment Request");
      const body = encodeURIComponent(
        "Name: " + name + "\nAddress: " + address
      );

      // Open email app
      window.location.href =
        `mailto:arunmanu2012@gmail.com?subject=${subject}&body=${body}`;

      // Show thank you page
      document.getElementById("mainPage").style.display = "none";
      document.getElementById("thankYouPage").style.display = "block";
    }
  </script>

</body>
</html>
